{% extends "base.html" %}
{% block title %}Manage Produk{% endblock %}

{% block header %}
<header class="topbar">
  <span class="topbar-title">Manage Produk</span>
  <div class="topbar-actions">
    <a href="{{ url_for('pages.tambah_produk') }}" class="btn btn-primary">
      <i data-lucide="plus"></i> Tambah Produk
    </a>
    <button class="icon-btn"><i data-lucide="calendar"></i></button>
    <button class="icon-btn"><i data-lucide="bell"></i><span class="dot"></span></button>
    <div class="topbar-user">
      <img src="https://i.pravatar.cc/72?img=12" alt="avatar admin" />
    </div>
  </div>
</header>
{% endblock %}

{% block content %}
<div class="toolbar-row">
  <div class="search-box">
    <i data-lucide="search"></i>
    <input type="text" id="search-produk" class="form-control" placeholder="Cari kode atau nama produk..." />
  </div>
</div>

<div class="card" style="padding:0;">
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Kode</th>
          <th>Produk</th>
          <th>Kategori</th>
          <th>Harga</th>
          <th>Stok</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="produk-tbody">
        <tr><td colspan="7" class="empty-state">Memuat data produk...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/produk.js') }}"></script>
{% endblock %}
