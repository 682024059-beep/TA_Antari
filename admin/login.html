<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoffeeShop Antari</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <!-- Sisi kiri: branding -->
        <div class="left-panel">
            <div class="brand-logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="20" fill="white"/>
                    <path d="M12 14h16v2H12zM13 16h14l-2 10H15L13 16zM24 14c0-2.5 3-4 3-4s-1 2 0 4" stroke="#3B1F0F" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="brand-name">Coffee Shop Antari</h1>
            <p class="brand-sub">Admin Antari — CoffeeShop</p>

            <!-- Ikon kopi besar di bawah -->
            <div class="brand-icon-big">
                <svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="20" y="60" width="160" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
                    <path d="M30 80 L190 80 L170 190 L50 190 Z" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
                    <path d="M190 80 Q220 80 220 110 Q220 140 190 140 L170 140" stroke="rgba(255,255,255,0.12)" stroke-width="3" fill="none"/>
                </svg>
            </div>
        </div>

        <!-- Sisi kanan: form login -->
        <div class="right-panel">
            <div class="login-form-wrapper">
                <h2 class="form-title">Admin - CoffeeShop Antari</h2>
                <p class="form-sub">Login sebagai Admin</p>

                <div class="form-group">
                    <label for="username">USERNAME</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- Ikon user -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Masukkan username"
                            autocomplete="username"
                        >
                    </div>
                    <span class="error-msg" id="error-username"></span>
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <!-- Ikon gembok -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Masukkan password"
                            autocomplete="current-password"
                        >
                        <button class="toggle-password" id="togglePassword" type="button" title="Lihat password">
                            <!-- Ikon mata -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-msg" id="error-password"></span>
                </div>

                <div class="forgot-link">
                    <a href="#">Lupa kata sandi?</a>
                </div>

                <button class="btn-masuk" id="btnLogin" type="button">
                    <span id="btn-text">Masuk →</span>
                    <span id="btn-loading" style="display:none;">Loading...</span>
                </button>

                <p class="error-msg global-error" id="error-global"></p>

                <p class="copyright">© 2024 COFFEE SHOP ANTARI. ALL RIGHTS RESERVED.</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
