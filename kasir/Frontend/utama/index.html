<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Antari Coffee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="login-body">

    <div class="login-wrapper">

        <!-- Sisi Kiri -->
        <div class="login-left">
            <div class="overlay-brand">
                <div class="brand-logo-circle">
                    <i class="fa-solid fa-mug-saucer"></i>
                </div>

                <h1>Antari Coffee</h1>
                <p>POS KASIR</p>

                <div class="line-decorator"></div>
            </div>

            <p class="copyright">© 2026 ANTARI COFFEE SHOP</p>
        </div>
        <div class="login-right">
            <div class="form-container">
                <h2>Kasir Antari</h2>
                <p class="subtitle">Hidup itu layaknya secangkir kopi, ada pahit yang harus dinikmati sebelum menemukan manisnya.</p>

                <form id="loginForm">
                    <div class="input-group-antari">
                        <label for="username">USERNAME</label>
                        <div class="input-field">
                            <i class="fa-regular fa-user"></i>
                            <input 
                                type="text" 
                                id="username" 
                                name="username"
                                autocomplete="username"
                                required>
                        </div>
                    </div>

                    <div class="input-group-antari">
                        <label for="password">PASSWORD</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                autocomplete="current-password"
                                required>

                            <i class="fa-regular fa-eye toggle-pwd" id="togglePassword"></i>
                        </div>
                    </div>

                    <p id="loginMessage" class="login-message"></p>

                    <button type="submit" id="btn-login-submit" class="btn-masuk">
                        Masuk <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <p class="notice-text">
                    Gunakan akun kasir yang telah terdaftar.
                </p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
