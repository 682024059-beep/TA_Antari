<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Antari Coffee</title>
    <!-- CSS Terhubung Langsung ke Frontend/utama/css/style.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <!-- Sisi Kiri: Branding Gelap -->
        <div class="login-left">
            <div class="overlay-brand">
                <div class="brand-logo-circle">
                    <i class="fa-solid fa-mug-saucer"></i>
                </div>
                <h1>Antari Coffee</h1>
                <p>SISTEM KASIR DIGITAL</p>
                <div class="line-decorator"></div>
            </div>
            <p class="copyright">© 2026 ANTARI COFFEE GROUP</p>
        </div>

        <!-- Sisi Kanan: Form Input -->
        <div class="login-right">
            <div class="form-container">
                <h2>Masuk ke Sistem</h2>
                <p class="subtitle">Login sebagai Kasir</p>

                <div class="input-group-antari">
                    <label>USERNAME</label>
                    <div class="input-field">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" placeholder="Masukkan username" value="kasir">
                    </div>
                </div>

                <div class="input-group-antari">
                    <label>PASSWORD</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan kata sandi" value="antari123">
                        <i class="fa-regular fa-eye toggle-pwd"></i>
                    </div>
                </div>

                <button id="btn-login-submit" class="btn-masuk">Masuk <i class="fa-solid fa-arrow-right"></i></button>

                <p class="notice-text">Gunakan akun kasir yang telah terdaftar oleh manager outlet.</p>
            </div>
        </div>
    </div>

    <!-- JavaScript Terhubung Langsung ke Frontend/utama/js/main.js -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
