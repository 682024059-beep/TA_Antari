<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Sistem Antari</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="login-shell">

  <div class="login-visual bean-texture">
    <div class="brand">
      <div class="mark" id="brand-mark"></div>
      <div class="word">ANTARI</div>
    </div>

    <div class="quote">
      <h2>Buat password baru untuk akun Antari Anda.</h2>
      <p>Pastikan password baru mudah diingat tetapi tidak mudah ditebak.</p>
    </div>

    <div class="foot">© 2026 CoffeeShop Antari — Sistem Point of Sale Internal</div>
  </div>

  <div class="login-form-side">
    <div class="login-card">
      <div class="eyebrow">Reset password</div>
      <h1>Password Baru</h1>
      <p class="lead">Masukkan password baru untuk akun admin Antari Anda.</p>

      <form id="reset-form">
        <div class="field">
          <label for="password">Password Baru</label>
          <div class="input-with-icon" style="position:relative;">
            <span id="icon-lock"></span>
            <input
              class="input"
              type="password"
              id="password"
              placeholder="Minimal 6 karakter"
              autocomplete="new-password"
              required
              minlength="6"
              oninvalid="this.setCustomValidity('Password baru minimal 6 karakter')"
              oninput="this.setCustomValidity('')"
            >
            <button type="button" class="pw-toggle" id="toggle-pw"></button>
          </div>
        </div>

        <div class="field">
          <label for="confirm-password">Konfirmasi Password</label>
          <div class="input-with-icon" style="position:relative;">
            <span id="icon-lock-confirm"></span>
            <input
              class="input"
              type="password"
              id="confirm-password"
              placeholder="Ulangi password baru"
              autocomplete="new-password"
              required
              minlength="6"
              oninvalid="this.setCustomValidity('Konfirmasi password tidak boleh kosong')"
              oninput="this.setCustomValidity('')"
            >
          </div>
        </div>

        <p class="error-text hidden" id="reset-message"></p>

        <button type="submit" class="btn btn-primary btn-block mt-8" id="btn-submit">
          Simpan Password Baru
        </button>

        <div style="text-align:center; margin-top:16px;">
          <a href="/admin/login.html" style="font-size:13px; color:var(--accent-700); font-weight:600;">
            Kembali ke Login
          </a>
        </div>
      </form>
    </div>
  </div>

</div>

<script src="js/icons.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>

<script>
  document.getElementById('brand-mark').innerHTML = ICONS.cup;

  const lockIcon = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="10" width="16" height="10" rx="2"/>
      <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
    </svg>
  `;

  document.getElementById('icon-lock').outerHTML = lockIcon;
  document.getElementById('icon-lock-confirm').outerHTML = lockIcon;
  document.getElementById('toggle-pw').innerHTML = ICONS.eye;

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const pwInput = document.getElementById('password');
  const toggleBtn = document.getElementById('toggle-pw');

  toggleBtn.addEventListener('click', () => {
    const isPassword = pwInput.type === 'password';

    pwInput.type = isPassword ? 'text' : 'password';
    toggleBtn.innerHTML = isPassword ? ICONS.eyeOff : ICONS.eye;
  });

  document.getElementById('reset-form').addEventListener('submit', async function(e){
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    const msg = document.getElementById('reset-message');
    const btn = document.getElementById('btn-submit');

    msg.classList.add('hidden');
    msg.textContent = '';

    if(!token){
      msg.textContent = 'Token reset password tidak ditemukan. Silakan minta link reset password ulang.';
      msg.classList.remove('hidden');
      msg.style.color = 'var(--danger-600)';
      return;
    }

    if(password.length < 6){
      msg.textContent = 'Password baru minimal 6 karakter.';
      msg.classList.remove('hidden');
      msg.style.color = 'var(--danger-600)';
      return;
    }

    if(password !== confirmPassword){
      msg.textContent = 'Konfirmasi password tidak sama.';
      msg.classList.remove('hidden');
      msg.style.color = 'var(--danger-600)';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Menyimpan...';

    try{
      const res = await Api.resetPassword(token, password);

      msg.textContent = res.message || 'Password berhasil direset. Silakan login dengan password baru.';
      msg.classList.remove('hidden');
      msg.style.color = 'var(--success-600)';

      btn.textContent = 'Berhasil';

      if(typeof showToast === 'function'){
        showToast('Password berhasil direset.', 'success');
      }

      setTimeout(() => {
        window.location.href = '/admin/login.html';
      }, 1200);

    }catch(err){
      msg.textContent = err.message || 'Gagal reset password.';
      msg.classList.remove('hidden');
      msg.style.color = 'var(--danger-600)';

      btn.disabled = false;
      btn.textContent = 'Simpan Password Baru';
    }
  });
</script>

</body>
</html>
