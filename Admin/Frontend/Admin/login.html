<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Sistem Antari</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-shell">

  <div class="login-visual bean-texture">
    <div class="brand">
      <div class="mark" id="brand-mark"></div>
      <div class="word">ANTARI</div>
    </div>
    <div class="quote">
      <h2>Setiap cangkir bercerita, setiap transaksi tercatat rapi.</h2>
    </div>
    <div class="foot">© 2026 CoffeeShop Antari — Sistem Point of Sale Internal</div>
  </div>

  <div class="login-form-side">
    <div class="login-card">
      <div class="eyebrow">Selamat datang kembali</div>
      <h1>Masuk ke Antari</h1>
      <p class="lead">Masukkan username dan password admin untuk mengakses Sistem Manajemen Antari.</p>

      <form id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <div class="input-with-icon">
            <span id="icon-user"></span>
            <input class="input" type="text" id="username" placeholder="Masukkan username" autocomplete="username" required>
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-with-icon" style="position:relative;">
            <span id="icon-lock"></span>
            <input class="input" type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" id="toggle-pw"></button>
          </div>
        </div>

        <p class="error-text hidden" id="login-error"></p>

        <button type="submit" class="btn btn-primary btn-block mt-8" id="btn-submit">Masuk</button>
      </form>
    </div>
  </div>

</div>

<script src="js/icons.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/dataService.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('brand-mark').innerHTML = ICONS.cup;
  document.getElementById('icon-user').outerHTML = ICONS.user;
  document.getElementById('icon-lock').outerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>`;
  document.getElementById('toggle-pw').innerHTML = ICONS.eye;

  // redirect if already logged in
  (function(){
    const s = getSession();
    if(s && getToken()){
      if(s.role === 'admin'){
        window.location.href = '/admin/dashboard.html';
      }else{
        clearToken();
        sessionStorage.removeItem(SESSION_KEY);
      }
    }
  })();

  const pwInput = document.getElementById('password');
  const toggleBtn = document.getElementById('toggle-pw');
  toggleBtn.addEventListener('click', ()=>{
    const isPw = pwInput.type === 'password';
    pwInput.type = isPw ? 'text' : 'password';
    toggleBtn.innerHTML = isPw ? ICONS.eyeOff : ICONS.eye;
  });

  document.getElementById('login-form').addEventListener('submit', async function(e){
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-submit');

    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Memeriksa...';

    const result = await login(username, password);

    if(!result.ok){
      errEl.textContent = result.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Masuk';
      return;
    }
    if(result.session.role !== 'admin'){
      clearToken();
      sessionStorage.removeItem(SESSION_KEY);
      errEl.textContent = 'Akun ini bukan admin. Gunakan akun admin untuk masuk ke Sistem Manajemen Antari.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Masuk';
      return;
    }
    window.location.href = '/admin/dashboard.html';
  });
</script>
</body>
</html>
